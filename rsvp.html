<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💌 אישור הגעה — מסיבת רווקות</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/rsvp.css" />
</head>
<body>
  <div class="deco-dots"></div>
  <div class="page-wrapper">

    <a href="index.html" class="back-btn">חזרה לתפריט</a>

    <header class="page-header fade-in">
      <span class="emoji">💌</span>
      <h1>אישור הגעה</h1>
      <p>נשמח לדעת אם את מצטרפת אלינו!</p>
    </header>

    <div class="card fade-in" style="animation-delay:0.1s">
      <form id="rsvpForm" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="fullName">שם מלא *</label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="לדוגמה: מאיה כהן"
            required
            autocomplete="name"
          />
        </div>

        <!-- Attending -->
        <div class="form-group">
          <label>האם תגיעי? *</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" name="attending" id="attendYes" value="yes" required />
              <label for="attendYes">🥂 כן, אני מגיעה!</label>
            </div>
            <div class="radio-option">
              <input type="radio" name="attending" id="attendNo" value="no" />
              <label for="attendNo">😢 מצטערת, לא אוכל להגיע</label>
            </div>
          </div>
        </div>

        <!-- Dietary -->
        <div class="form-group" id="dietarySection">
          <label for="dietary">אלרגיות / העדפות תזונתיות</label>
          <textarea
            id="dietary"
            name="dietary"
            placeholder="לדוגמה: צמחונית, ללא גלוטן, אלרגיה לאגוזים..."
          ></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span id="btnText">שליחת אישור הגעה 💗</span>
          <span id="btnSpinner" class="spinner" style="display:none;"></span>
        </button>

      </form>

      <div class="alert alert-success" id="successAlert">
        🎉 תודה! אישור ההגעה שלך התקבל. לא יכולות לחכות לחגוג איתך!
      </div>
      <div class="alert alert-error" id="errorAlert">
        ❌ אופס! משהו השתבש. נסי שוב או צרי קשר עם המארגנת.
      </div>
    </div>

    <!-- Already submitted? -->
    <p class="rsvp-footnote fade-in" style="animation-delay:0.25s">
      כבר אישרת הגעה? צרי קשר עם המארגנת לכל שינוי. 💬
    </p>

  </div>

  <!-- Firebase SDK (ES Module) -->
  <script type="module">
    import { db } from './js/firebase-config.js';
    import {
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const form        = document.getElementById('rsvpForm');
    const submitBtn   = document.getElementById('submitBtn');
    const btnText     = document.getElementById('btnText');
    const btnSpinner  = document.getElementById('btnSpinner');
    const successAlert = document.getElementById('successAlert');
    const errorAlert   = document.getElementById('errorAlert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const attending = form.querySelector('input[name="attending"]:checked');
      const dietary  = document.getElementById('dietary').value.trim();

      // Validation
      if (!fullName) {
        alert('נא להזין שם מלא.');
        return;
      }
      if (!attending) {
        alert('נא לבחור האם את מגיעה.');
        return;
      }

      // Loading state
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';
      successAlert.classList.remove('show');
      errorAlert.classList.remove('show');

      try {
        await addDoc(collection(db, 'rsvp_list'), {
          fullName,
          attending: attending.value,
          dietary: dietary || null,
          submittedAt: serverTimestamp()
        });

        successAlert.classList.add('show');
        form.reset();
      } catch (err) {
        console.error('RSVP Error:', err);
        errorAlert.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
